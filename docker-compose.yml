services:
  postgres:
    image: postgres:16
    container_name: sentinel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel123
      POSTGRES_DB: sentinel_ai
    ports:
      - "5432:5432"
    volumes:
      - sentinel_pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sentinel_pgdata: